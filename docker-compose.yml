services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: menu_dev
      POSTGRES_USER: menu
      POSTGRES_PASSWORD: menu
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U menu -d menu_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://menu:menu@db:5432/menu_dev
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    develop:
      watch:
        - action: sync+restart
          path: ./backend
          target: /app
          ignore:
            - .venv/
            - __pycache__/

volumes:
  postgres_data:
